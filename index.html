<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 60px 80px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .clock {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2),
                        inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .clock::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #667eea;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .number span {
            position: absolute;
            left: 50%;
            transform-origin: 0 150px;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #333;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 80px;
            margin-left: -3px;
            background: #333;
            z-index: 3;
        }

        .minute-hand {
            width: 4px;
            height: 110px;
            margin-left: -2px;
            background: #555;
            z-index: 2;
        }

        .second-hand {
            width: 2px;
            height: 130px;
            margin-left: -1px;
            background: #e74c3c;
            z-index: 1;
        }

        .digital-clock {
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .date {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
        }

        .mode-toggle {
            margin-top: 30px;
        }

        .mode-toggle button {
            padding: 12px 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .mode-toggle button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
            }

            .clock {
                width: 250px;
                height: 250px;
            }

            .number span {
                transform-origin: 0 125px;
            }

            .digital-clock {
                font-size: 36px;
            }

            .date {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="digital-clock" id="digitalClock">00:00:00</div>
        <div class="date" id="date">2024年1月1日 星期一</div>
        
        <div class="clock" id="analogClock">
            <div class="number" id="numbers"></div>
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="hand second-hand" id="secondHand"></div>
        </div>

        <div class="mode-toggle">
            <button onclick="toggleClockMode()">切换显示模式</button>
        </div>
    </div>

    <script>
        // 生成时钟数字
        const numbersDiv = document.getElementById('numbers');
        for (let i = 1; i <= 12; i++) {
            const span = document.createElement('span');
            span.textContent = i;
            span.style.transform = `rotate(${i * 30}deg) translateX(-50%)`;
            numbersDiv.appendChild(span);
        }

        // 更新时钟
        function updateClock() {
            const now = new Date();
            
            // 数字时钟
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digitalClock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 日期
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const day = days[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 ${day}`;
            
            // 指针时钟
            const secondsDeg = ((now.getSeconds() / 60) * 360);
            const minutesDeg = ((now.getMinutes() / 60) * 360) + ((now.getSeconds() / 60) * 6);
            const hoursDeg = ((now.getHours() % 12) / 12 * 360) + ((now.getMinutes() / 60) * 30);
            
            document.getElementById('secondHand').style.transform = `rotate(${secondsDeg}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${minutesDeg}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${hoursDeg}deg)`;
        }

        // 切换显示模式
        let showAnalog = true;
        function toggleClockMode() {
            const analogClock = document.getElementById('analogClock');
            showAnalog = !showAnalog;
            analogClock.style.display = showAnalog ? 'block' : 'none';
        }

        // 初始化和定时更新
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
